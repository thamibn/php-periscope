name: Docs

# Builds the VitePress site under docs/site/ on every push to main and
# deploys the static output to Cloudflare Pages. Pull requests build but
# do not deploy.
#
# Required GitHub secrets:
#   - CLOUDFLARE_API_TOKEN  — token with "Account / Cloudflare Pages: Edit" permission
#   - CLOUDFLARE_ACCOUNT_ID — your Cloudflare account id
#
# The Pages project name is configured below; create it once via the
# Cloudflare dashboard (or `wrangler pages project create php-periscope-docs`)
# before the first deploy run.

on:
  push:
    branches: [main]
    paths:
      - "docs/site/**"
      - ".github/workflows/docs.yml"
    # Always rebuild on a release tag — the site's version banner is
    # resolved from the GitHub Releases API at build time, so a new tag
    # changes the rendered output even when docs/site/** is untouched.
    tags:
      - "v*"
  pull_request:
    branches: [main]
    paths:
      - "docs/site/**"
      - ".github/workflows/docs.yml"
  # Manual re-run from the Actions tab or `gh workflow run docs.yml`. Lets
  # us re-deploy after a secret rotation or a one-off doc edit on a
  # branch that didn't touch docs/site/**.
  workflow_dispatch: {}

permissions:
  contents: read
  deployments: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build VitePress site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: docs/site/package-lock.json

      - name: Install
        run: npm ci
        working-directory: docs/site

      - name: Build
        run: npm run build
        working-directory: docs/site

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-dist
          path: docs/site/.vitepress/dist
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: deploy to Cloudflare Pages
    needs: build
    # Deploy on a real push to main, a release-tag push, or a manual re-run
    # from the Actions tab. Workflow-dispatch is how we re-publish after a
    # release was cut without a corresponding docs commit.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-dist
          path: dist

      - name: Publish to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=php-periscope-docs --branch=main
