name: JetBrains plugin

on:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - "jetbrains-plugin/**"
      - ".github/workflows/jetbrains-plugin.yml"
  pull_request:
    branches: [main]
    paths:
      - "jetbrains-plugin/**"
      - ".github/workflows/jetbrains-plugin.yml"
  schedule:
    # Weekly verifier — catches new IntelliJ versions breaking compat.
    # Runs Sunday 03:00 UTC. Free Linux minutes, no rush.
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: write  # needed to attach the .zip to a Release on tag pushes

# Cancel in-flight runs on the same ref when a new push arrives. The
# difference between "I pushed 5 times in 2 minutes" being 5 full builds
# vs 1 final build.
concurrency:
  group: jetbrains-plugin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build .zip
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jetbrains-plugin
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build plugin
        run: ./gradlew buildPlugin --no-daemon --stacktrace

      - name: Rename .zip to stable filename
        run: |
          cd build/distributions
          original="$(ls *.zip | head -1)"
          cp "$original" periscope-jetbrains.zip
          ls -lah

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: periscope-jetbrains
          path: jetbrains-plugin/build/distributions/*.zip
          if-no-files-found: error

      - name: Attach to GitHub Release (on tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            jetbrains-plugin/build/distributions/periscope-jetbrains.zip
            jetbrains-plugin/build/distributions/periscope-jetbrains-*.zip
          fail_on_unmatched_files: false
          generate_release_notes: true

  # Plugin verifier downloads ~1GB of IntelliJ binaries and takes ~5min.
  # Not worth running on every push — moves to weekly cron + manual dispatch.
  # Tag pushes still skip it (they're already releases; verifier results
  # don't gate the release).
  verify:
    name: plugin verifier
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jetbrains-plugin
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Run IntelliJ Plugin Verifier
        run: ./gradlew verifyPlugin --no-daemon
        continue-on-error: true
