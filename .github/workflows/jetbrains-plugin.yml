name: JetBrains plugin

on:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - "jetbrains-plugin/**"
      - ".github/workflows/jetbrains-plugin.yml"
  pull_request:
    branches: [main]
    paths:
      - "jetbrains-plugin/**"
      - ".github/workflows/jetbrains-plugin.yml"
  schedule:
    # Weekly verifier — catches new IntelliJ versions breaking compat.
    # Runs Sunday 03:00 UTC. Free Linux minutes, no rush.
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: write  # needed to attach the .zip to a Release on tag pushes

# Cancel in-flight runs on the same ref when a new push arrives. The
# difference between "I pushed 5 times in 2 minutes" being 5 full builds
# vs 1 final build.
concurrency:
  group: jetbrains-plugin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build .zip
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jetbrains-plugin
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      # The big-ticket cache. intellij-platform-gradle-plugin 2.x downloads
      # the full PhpStorm SDK (~700MB) into ~/.gradle/caches/IntelliJPlatform.
      # Key it on the platformVersion declared in gradle.properties — that's
      # the only file that changes the SDK we resolve. As long as we don't
      # bump 2024.2.5 -> 2024.3, the cache survives across runs.
      - name: Cache IntelliJ Platform SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/IntelliJPlatform
          key: intellij-platform-${{ runner.os }}-${{ hashFiles('jetbrains-plugin/gradle.properties') }}
          restore-keys: |
            intellij-platform-${{ runner.os }}-

      - name: Build plugin
        run: ./gradlew buildPlugin --no-daemon --stacktrace

      - name: Rename .zip to stable filename
        run: |
          cd build/distributions
          original="$(ls *.zip | head -1)"
          cp "$original" periscope-jetbrains.zip
          ls -lah

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: periscope-jetbrains
          path: jetbrains-plugin/build/distributions/*.zip
          if-no-files-found: error

      - name: Attach to GitHub Release (on tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            jetbrains-plugin/build/distributions/periscope-jetbrains.zip
            jetbrains-plugin/build/distributions/periscope-jetbrains-*.zip
          fail_on_unmatched_files: false
          generate_release_notes: true

  # Plugin verifier downloads ~1GB of IntelliJ binaries (multiple IDE versions
  # to check compat against — that's where the GB comes from, not from the
  # build SDK). Not worth running on every push — moves to weekly cron + manual
  # dispatch. The verifier IDEs themselves get cached the same way as the SDK.
  verify:
    name: plugin verifier
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jetbrains-plugin
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      # Same IntelliJ Platform cache as the build job uses, plus the
      # verifier-specific IDE downloads. After the first weekly run, the
      # subsequent weeks reuse this cache and the verifier takes <1min.
      - name: Cache IntelliJ Platform SDK + verifier IDEs
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/IntelliJPlatform
            ~/.gradle/caches/pluginVerifier
          key: intellij-verifier-${{ runner.os }}-${{ hashFiles('jetbrains-plugin/gradle.properties', 'jetbrains-plugin/build.gradle.kts') }}
          restore-keys: |
            intellij-verifier-${{ runner.os }}-
            intellij-platform-${{ runner.os }}-

      - name: Run IntelliJ Plugin Verifier
        run: ./gradlew verifyPlugin --no-daemon
        continue-on-error: true
