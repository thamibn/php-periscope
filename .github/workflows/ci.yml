name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: phpize, php-config
          coverage: none

      - name: Install Cap'n Proto (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y capnproto libcapnp-dev

      - name: Install Cap'n Proto (macOS)
        if: runner.os == 'macOS'
        run: brew install capnp

      - name: Build extension
        run: make extension

      - name: Diagnose extension load (capture dlopen errors)
        run: |
          set +e
          SO="$PWD/extension/modules/periscope.so"
          echo "==> php --version"
          php --version
          echo "==> ldd / otool on $SO"
          (ldd "$SO" || otool -L "$SO") 2>&1 | head -30
          echo "==> php -d extension=$SO -m (stderr merged)"
          php -d extension="$SO" -m 2>&1
          echo "==> exit=$?"

      - name: Run .phpt suite
        run: make test

      - name: Upload .phpt diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: phpt-diffs-${{ matrix.os }}
          path: |
            extension/tests/**/*.diff
            extension/tests/**/*.out
            extension/tests/**/*.log
          if-no-files-found: ignore

      - name: Smoke tests
        run: bash scripts/smoke.sh

  asan:
    name: build with AddressSanitizer (linux only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: phpize, php-config
          coverage: none

      - name: Install Cap'n Proto
        run: |
          sudo apt-get update
          sudo apt-get install -y capnproto libcapnp-dev

      - name: Build with -fsanitize=address
        env:
          CFLAGS: "-fsanitize=address -fno-omit-frame-pointer -g"
          LDFLAGS: "-fsanitize=address"
        run: make extension

      - name: Smoke tests under ASan
        env:
          ASAN_OPTIONS: "detect_leaks=0:abort_on_error=1"
        run: bash scripts/smoke.sh
