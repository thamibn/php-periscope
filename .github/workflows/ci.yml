name: CI

on:
  push:
    branches: [main]
    paths:
      - "extension/**"
      - "Makefile"
      - "scripts/smoke.sh"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "extension/**"
      - "Makefile"
      - "scripts/smoke.sh"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

# A new push to the same branch cancels in-flight CI runs. Saves minutes on
# rapid-iteration sessions where the latest push is the only one that matters.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS minutes count 10x toward the free quota. Only burn them on PRs
        # (full matrix) — push-to-main runs Linux-only and we trust the
        # already-green PR build for macOS coverage.
        os: ${{ github.event_name == 'pull_request' && fromJson('["ubuntu-latest", "macos-latest"]') || fromJson('["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: phpize, php-config
          coverage: none

      - name: Install Cap'n Proto (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y capnproto libcapnp-dev

      - name: Install Cap'n Proto (macOS)
        if: runner.os == 'macOS'
        run: brew install capnp

      - name: Build extension
        run: make extension

      - name: Run .phpt suite
        run: make test

      - name: Upload .phpt diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: phpt-diffs-${{ matrix.os }}
          path: |
            extension/tests/**/*.diff
            extension/tests/**/*.out
            extension/tests/**/*.log
          if-no-files-found: ignore

      - name: Smoke tests
        run: bash scripts/smoke.sh

  # ASan only runs on PRs — duplicates the Linux build job on push-to-main
  # and the regular build catches the same compile-level issues. Keep it on
  # PRs as a paranoia check, but stop spending minutes on every push.
  asan:
    name: build with AddressSanitizer (linux only)
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: phpize, php-config
          coverage: none

      - name: Install Cap'n Proto
        run: |
          sudo apt-get update
          sudo apt-get install -y capnproto libcapnp-dev

      - name: Build with -fsanitize=address
        env:
          CFLAGS: "-fsanitize=address -fno-omit-frame-pointer -g"
          LDFLAGS: "-fsanitize=address"
        run: make extension

      - name: Verify ASan build produced .so
        run: |
          test -f extension/modules/periscope.so
          file extension/modules/periscope.so | grep -q 'shared object\|dynamically linked'
          echo "ASan build OK. Runtime ASan smoke is gated on an ASan-built PHP — out of scope for v0.1.0-alpha."
