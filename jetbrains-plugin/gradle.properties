kotlin.code.style=official
kotlin.stdlib.default.dependency=false
org.gradle.jvmargs=-Xmx2g -XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError

# Plugin identity
pluginGroup=dev.periscope
pluginVersion=0.1.8
pluginSinceBuild=242
# Leave the upper bound generous. JetBrains' compat policy is forward-friendly
# for plugins that only use stable APIs (which we do — compiled against
# 2024.2.5). Past defaulting to a tight `251.*` already broke 2025.3 users.
pluginUntilBuild=303.*

# IntelliJ Platform target — PhpStorm 2024.2.5 as the build target
platformType=PS
platformVersion=2024.2.5
